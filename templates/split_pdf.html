{% extends 'base.html' %}

{% block title %}
Split PDF Tool
{% endblock %}

{% block content %}

<section class="py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-6">

                <div class="card shadow p-5 border-0 rounded-4">

                    <h1 class="text-center mb-4">

                        Split PDF Tool

                    </h1>

                    <form method="POST"
                          enctype="multipart/form-data">

                        {% csrf_token %}

                        <label class="fw-bold mb-2">
                            Upload PDF
                        </label>

                        <input type="file"
                               name="pdf"
                               class="form-control mb-4"
                               accept=".pdf"
                               required>

                        <button type="submit"
                                class="btn btn-success w-100">

                            Split PDF

                        </button>

                    </form>

                    {% if split_pdf_file %}

                    <div class="alert alert-success mt-4 text-center">

                        <h4>
                            PDF Split Successfully
                        </h4>

                        <a href="/media/{{ split_pdf_file }}"
                           download
                           class="btn btn-success mt-3">

                            Download First Page

                        </a>

                    </div>

                    {% endif %}

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
