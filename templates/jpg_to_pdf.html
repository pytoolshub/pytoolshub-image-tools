{% extends 'base.html' %}

{% block title %}
JPG to PDF Converter
{% endblock %}

{% block content %}

<section class="py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-6">

                <div class="card shadow p-5 border-0 rounded-4">

                    <h1 class="text-center mb-4">

                        JPG to PDF Converter

                    </h1>

                    <form method="POST"
                          enctype="multipart/form-data">

                        {% csrf_token %}

                        <input type="file"
                               name="image"
                               class="form-control mb-4"
                               accept=".jpg,.jpeg"
                               required>

                        <button type="submit"
                                class="btn btn-success w-100">

                            Convert to PDF

                        </button>

                    </form>

                    {% if pdf_file %}

                    <div class="alert alert-success mt-4 text-center">

                        <h4>
                            PDF Created Successfully
                        </h4>

                        <a href="/media/{{ pdf_file }}"
                           download
                           class="btn btn-success mt-3">

                            Download PDF

                        </a>

                    </div>

                    {% endif %}

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
