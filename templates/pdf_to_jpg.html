{% extends 'base.html' %}

{% block title %}
PDF to JPG Converter
{% endblock %}

{% block content %}

<section class="py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-6">

                <div class="card shadow p-5 border-0 rounded-4">

                    <h1 class="text-center mb-4">

                        PDF to JPG Converter

                    </h1>

                    <form method="POST"
                          enctype="multipart/form-data">

                        {% csrf_token %}

                        <input type="file"
                               name="pdf"
                               class="form-control mb-4"
                               accept=".pdf"
                               required>

                        <button type="submit"
                                class="btn btn-success w-100">

                            Convert to JPG

                        </button>

                    </form>

                    {% if converted_image %}

                    <div class="alert alert-success mt-4 text-center">

                        <h4>
                            PDF Converted Successfully
                        </h4>

                        <img src="/media/{{ converted_image }}"
                             class="img-fluid rounded shadow mt-3">

                        <br><br>

                        <a href="/media/{{ converted_image }}"
                           download
                           class="btn btn-success">

                            Download JPG

                        </a>

                    </div>

                    {% endif %}

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
